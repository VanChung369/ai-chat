name: Deploy Open WebUI

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-open-webui-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    env:
      DEPLOY_PATH: /home/vanchung/deploy/open-webui

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare Deploy Directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${DEPLOY_PATH}"

      - name: Sync source
        shell: bash
        run: |
          set -euo pipefail
          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".env" \
            ./ "${DEPLOY_PATH}/"

      - name: Create .env file
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "${{ secrets.ENV_FILE }}" > "${DEPLOY_PATH}/.env"

      - name: Deploy with Docker Compose
        shell: bash
        run: |
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          docker compose pull
          docker compose up -d

      - name: Health check Open WebUI
        run: |
          sleep 8
          curl -I http://localhost:3876 || curl http://localhost:3876

      - name: Cleanup
        shell: bash
        run: |
          set -euo pipefail
          docker image prune -f
