services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "${WEBUI_PORT}:3876"
    environment:
      - "OLLAMA_BASE_URL=${OLLAMA_API_URL}"
      - "ENABLE_SIGNUP=true"
      - "DEFAULT_MODEL=${DEFAULT_MODEL}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui:/app/data

volumes:
  open-webui: